<svg width="400" height="80" viewBox="0 0 400 80" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PetSpot El Sahel Veterinary Clinic">
  <title>PetSpot El Sahel</title>

  <defs>
    <linearGradient id="brandDeep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#134d63"/>
      <stop offset="55%" stop-color="#1a5f7a"/>
      <stop offset="100%" stop-color="#2d8f6f"/>
    </linearGradient>
    <linearGradient id="brandRing" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1AD3BB"/>
      <stop offset="50%" stop-color="#2EBCFA"/>
      <stop offset="100%" stop-color="#1AD3BB"/>
    </linearGradient>
    <linearGradient id="spotAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#18c4ae"/>
      <stop offset="100%" stop-color="#2EBCFA"/>
    </linearGradient>
    <linearGradient id="waveFill" x1="100" y1="0" x2="340" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1AD3BB" stop-opacity="0"/>
      <stop offset="35%" stop-color="#1AD3BB" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2EBCFA" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="emblemShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#134d63" flood-opacity="0.22"/>
    </filter>
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.5" flood-color="#ffffff" flood-opacity="0.6"/>
    </filter>
    <clipPath id="emblemClip">
      <circle cx="40" cy="40" r="30"/>
    </clipPath>
  </defs>

  <!-- Emblem -->
  <g filter="url(#emblemShadow)">
    <circle cx="40" cy="40" r="36" fill="url(#brandDeep)"/>
    <circle cx="40" cy="40" r="36" fill="none" stroke="url(#brandRing)" stroke-width="2.5" opacity="0.9"/>
    <circle cx="40" cy="40" r="30" fill="#ffffff"/>
    <circle cx="40" cy="40" r="30" fill="url(#brandDeep)" fill-opacity="0.04"/>

    <g clip-path="url(#emblemClip)" transform="translate(15, 15) scale(1.02)">
      <path d="M25 17C25.2523 16.9997 25.5013 17.0574 25.7283 17.1688C26.31 17.4556 40 24.3052 40 35.5626C40 37.2312 39.5113 38.8624 38.5957 40.2499C37.6801 41.6374 36.3788 42.7188 34.8562 43.3575C33.3337 43.9962 31.6582 44.1634 30.0418 43.8381C28.4254 43.5127 26.9405 42.7093 25.775 41.5296L25 40.7449L24.225 41.5296C23.0595 42.7093 21.5746 43.5127 19.9582 43.8381C18.3418 44.1634 16.6663 43.9962 15.1438 43.3575C13.6212 42.7188 12.3199 41.6374 11.4043 40.2499C10.4887 38.8624 10 37.2312 10 35.5626C10 24.3474 23.6867 17.459 24.27 17.1688C24.4975 17.0572 24.7472 16.9995 25 17Z" fill="url(#brandDeep)"/>
      <circle cx="9" cy="18" r="5" fill="#1AD3BB"/>
      <circle cx="19" cy="10" r="5" fill="#2EBCFA"/>
      <circle cx="31" cy="10" r="5" fill="#2EBCFA"/>
      <circle cx="41" cy="18" r="5" fill="#1AD3BB"/>
    </g>

    <g transform="translate(60, 10)">
      <circle r="10" fill="url(#spotAccent)"/>
      <circle r="10" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.85"/>
      <rect x="-1.4" y="-5.5" width="2.8" height="11" rx="1.2" fill="#ffffff"/>
      <rect x="-5.5" y="-1.4" width="11" height="2.8" rx="1.2" fill="#ffffff"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g filter="url(#textGlow)">
    <text x="90" y="38" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
      <tspan font-size="30" font-weight="800" fill="#123f52" letter-spacing="-0.8">Pet</tspan>
      <tspan font-size="30" font-weight="800" fill="url(#spotAccent)" letter-spacing="-0.8">Spot</tspan>
      <tspan font-size="19" font-weight="600" fill="#2d8f6f" dx="10" dy="1">El Sahel</tspan>
    </text>
  </g>

  <!-- Coastal wave accent -->
  <path d="M90 48 C120 42, 140 54, 170 48 S230 42, 270 48 S330 54, 360 46" stroke="url(#brandRing)" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M90 52 C130 58, 160 44, 200 52 S260 60, 310 50" stroke="url(#waveFill)" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="90" y="70" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#5f8f99" letter-spacing="2.6">VETERINARY CLINIC  ·  NORTH COAST EGYPT</text>
</svg>
